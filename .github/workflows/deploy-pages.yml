name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config
        run: node scripts/generate-config.mjs
        env:
          BINANCE_API: https://api.binance.com/api/v3
          COINSTATS_API: https://openapiv1.coinstats.app
          COINSTATS_API_KEY: ${{ secrets.COINSTATS_API_KEY }}
          ETH_API: https://api.etherscan.io/v2/api
          ETH_KEY: ${{ secrets.ETH_KEY }}

      - name: Build static artifact
        run: |
          mkdir dist
          cp index.html styles.css favicon.ico dist/
          cp -R js styles images dist/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
